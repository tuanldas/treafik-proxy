# ============================================================
# Loki single-binary config (target=all). Filesystem store + retention.
# ============================================================
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Giới hạn + retention (mặc định Loki giữ VÔ HẠN — phải set).
limits_config:
  retention_period: 744h          # ≈ 31 ngày, khớp Prometheus 30d
  reject_old_samples: true
  reject_old_samples_max_age: 168h

# Compactor lo việc xoá log quá hạn.
compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true
