# ============================================================
# Prometheus — scrape metrics từ Traefik
# ============================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Gửi alert đã fire sang Alertmanager (chỉ tác dụng khi bật service alertmanager)
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# Nạp alert rules (host / container / traefik)
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Metrics của chính Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Metrics của Traefik (cổng 8082 khai báo trong traefik.yml)
  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8082"]

  # Metric máy chủ (chỉ thu được khi bật service node-exporter)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Metric container (chỉ thu được khi bật service cadvisor)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # Blackbox: probe uptime/SSL từng domain (target sinh bởi setup.sh từ Host()).
  # Chỉ hoạt động khi bật service blackbox-exporter; file_sd tự reload, không cần restart.
  - job_name: "blackbox"
    metrics_path: /probe
    scrape_interval: 30s
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/blackbox.generated.yml
    relabel_configs:
      - source_labels: [module]
        target_label: __param_module
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
      - regex: module
        action: labeldrop

  # Metric vận hành của chính blackbox-exporter
  - job_name: "blackbox-exporter"
    static_configs:
      - targets: ["blackbox-exporter:9115"]
