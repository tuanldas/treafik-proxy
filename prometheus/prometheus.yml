# ============================================================
# Prometheus — scrape metrics từ Traefik
# ============================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Metrics của chính Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Metrics của Traefik (cổng 8082 khai báo trong traefik.yml)
  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8082"]

  # Metric máy chủ (chỉ thu được khi bật service node-exporter)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Metric container (chỉ thu được khi bật service cadvisor)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
